name: Zenith V2.9 Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Quality Control
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build & Run Tests
        run: |
          go build -o zenith ./src/cmd/zenith/main.go
          chmod +x ./zenith
          for file in test/*.zen; do
            echo "Testing $file..."
            ./zenith run "$file" || exit 1
          done

  release:
    name: Multi-Platform Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Cross-Compile
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/zenith-linux-amd64 ./src/cmd/zenith/main.go
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/zenith-macos-arm64 ./src/cmd/zenith/main.go
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/zenith-windows.exe ./src/cmd/zenith/main.go

      - name: GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}
          name: Zenith ${{ github.ref_name }} - Stable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
