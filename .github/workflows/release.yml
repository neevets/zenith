name: Zenith Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    name: Quality Control
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build check
        run: cargo check --all-targets --locked

      - name: Run tests
        run: cargo test --all-targets --locked

  build:
    name: Build ${{ matrix.os }}
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: zenith-linux-amd64
            bin: zenith
          - os: macos-latest
            target_name: zenith-macos-arm64
            bin: zenith
          - os: windows-latest
            target_name: zenith-windows-amd64
            bin: zenith.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package tar.gz (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.bin }} ./${{ matrix.bin }}
          tar -czf dist/${{ matrix.target_name }}.tar.gz ./${{ matrix.bin }}
          rm ./${{ matrix.bin }}

      - name: Package tar.gz (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target/release/${{ matrix.bin }}" "${{ matrix.bin }}"
          tar -czf "dist/${{ matrix.target_name }}.tar.gz" "${{ matrix.bin }}"
          Remove-Item "${{ matrix.bin }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target_name }}
          path: dist/${{ matrix.target_name }}.tar.gz

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release with gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || \
            gh release create "${{ github.ref_name }}" --title "Zenith ${{ github.ref_name }}" --notes "Automated release for ${{ github.ref_name }}"
          gh release upload "${{ github.ref_name }}" dist/*.tar.gz --clobber
