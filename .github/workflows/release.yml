name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    name: Quality Control
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Build check
        run: cargo check --all-targets --locked
      - name: Run tests
        run: cargo test --all-targets --locked

  build:
    name: Build ${{ matrix.target_name }}
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- NUEVA VERSIÓN PRO (MUSL) PARA LINUX ---
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            target_name: zenith-linux-x86_64-static
            bin: zenith

          # Versión estándar (GNU)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            target_name: zenith-linux-x86_64
            bin: zenith

          - os: macos-latest
            target: x86_64-apple-darwin
            target_name: zenith-macos-x86_64
            bin: zenith

          - os: macos-latest
            target: aarch64-apple-darwin
            target_name: zenith-macos-arm64
            bin: zenith

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            target_name: zenith-windows-x86_64
            bin: zenith.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Instalamos las herramientas para compilar MUSL en Ubuntu
      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package tar.gz (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} ./${{ matrix.bin }}
          tar -czf dist/${{ matrix.target_name }}.tar.gz ./${{ matrix.bin }}
          rm ./${{ matrix.bin }}

      - name: Package tar.gz (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" "${{ matrix.bin }}"
          tar -czf "dist/${{ matrix.target_name }}.tar.gz" "${{ matrix.bin }}"
          Remove-Item "${{ matrix.bin }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target_name }}
          path: dist/${{ matrix.target_name }}.tar.gz

  release:
    name: Publish GitHub Release
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve release tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            VERSION="$(awk -F'"' '/^version = / { print $2; exit }' Cargo.toml)"
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release with gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --target "$GITHUB_SHA" --title "Zenith $RELEASE_TAG" --notes "Automated release for $RELEASE_TAG"
          gh release upload "$RELEASE_TAG" dist/*.tar.gz --clobber
