name: Installer

on:
  push:
    branches: [main]
    paths:
      - scripts/install.sh
      - scripts/install.ps1
      - docs/installation.md
      - README.md
      - .github/workflows/installer.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare Pages artifact
        run: |
          mkdir -p public
          
          # Copiamos instaladores
          cp scripts/install.sh public/install.sh
          cp scripts/install.ps1 public/install.ps1
          chmod +x public/install.sh
          
          cp assets/zen-logo.png public/favicon.png || true

          USER_NAME="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BASE_URL="https://${USER_NAME,,}.github.io/${REPO_NAME,,}/"

          cat > public/index.html <<HTML
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Zenith Installer</title>
              <link rel="icon" type="image/png" href="favicon.png">
              <style>
                body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 20px; background: #0d1117; color: #c9d1d9; }
                pre { background: #161b22; color: #58a6ff; padding: 15px; border-radius: 6px; border: 1px solid #30363d; overflow-x: auto; }
                h1 { color: #f0f6fc; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
                h3 { color: #8b949e; }
                code { color: #ff7b72; }
              </style>
            </head>
            <body>
              <h1>Zenith</h1>
              <p>The installer auto-detects the architecture and installs the latest stable release.</p>
              
              <h3>Linux / MacOS</h3>
              <pre>curl -fsSL ${BASE_URL}install.sh | sh -s -- -y</pre>
              
              <h3>Windows (PowerShell)</h3>
              <pre>iwr -useb ${BASE_URL}install.ps1 | iex</pre>
            </body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
